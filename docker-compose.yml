services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lais
      POSTGRES_PASSWORD: lais
      POSTGRES_DB: lais_close
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lais -d lais_close"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/templates:/app/templates
      - ./backend/uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://lais:lais@postgres:5432/lais_close
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

volumes:
  pgdata:
